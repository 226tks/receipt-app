<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レジ締めOCRアプリ</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { font-family:sans-serif; margin:0; background:#f2f2f2; }
.header { background:black;color:white;padding:15px;text-align:center; }
.container { padding:15px; }
.card { background:white;padding:15px;border-radius:12px;margin-bottom:15px; }
input { width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc; }
button { width:100%;padding:15px;font-size:18px;background:black;color:white;border:none; }
.fixed { position:fixed;bottom:0;width:100%; }

.loading {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;justify-content:center;align-items:center;color:white;
}
</style>
</head>

<body>

<div class="header">レジ締めOCRアプリ</div>

<div class="container">
<input type="file" id="img" accept="image/*" capture="environment">

<div class="card">
<h3>1レジ</h3>
客数<input id="c1">
売上<input id="t1">
税<input id="tax1">
純売上<input id="n1">
</div>

<div class="card">
<h3>2レジ</h3>
客数<input id="c2">
売上<input id="t2">
税<input id="tax2">
純売上<input id="n2">
</div>

<div class="card" id="result"></div>
</div>

<button class="fixed" onclick="read()">📸 読み取り</button>

<div class="loading" id="loading">読み取り中...</div>

<script>

// 読み取り
async function read(){
  const file = img.files[0];
  if(!file) return alert("画像を選択");

  try{
    showLoading(true);

    const canvases = await splitAndPreprocess(file);

    const res1 = await Tesseract.recognize(canvases.left,"jpn");
    const res2 = await Tesseract.recognize(canvases.right,"jpn");

    applyOCR(res1.data.text, res2.data.text);

  }catch(e){
    alert("読み取り失敗");
    console.error(e);
  }finally{
    showLoading(false);
  }
}

// ローディング
function showLoading(v){
  loading.style.display = v ? "flex":"none";
}

// 画像分割＋前処理
async function splitAndPreprocess(file){
  return new Promise(resolve=>{
    const img = new Image();
    const rd = new FileReader();

    rd.onload = ()=> img.src = rd.result;

    img.onload = ()=>{

      const w = img.width;
      const h = img.height;

      const c1 = document.createElement("canvas");
      const ctx1 = c1.getContext("2d");
      c1.width = w/2;
      c1.height = h;
      ctx1.drawImage(img,0,0,w/2,h,0,0,w/2,h);
      preprocess(ctx1,c1);

      const c2 = document.createElement("canvas");
      const ctx2 = c2.getContext("2d");
      c2.width = w/2;
      c2.height = h;
      ctx2.drawImage(img,w/2,0,w/2,h,0,0,w/2,h);
      preprocess(ctx2,c2);

      resolve({left:c1,right:c2});
    };

    rd.readAsDataURL(file);
  });
}

// 前処理（二値化）
function preprocess(ctx,canvas){
  const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imgData.data;

  for(let i=0;i<data.length;i+=4){
    const avg = (data[i]+data[i+1]+data[i+2])/3;
    const val = avg > 150 ? 255 : 0;
    data[i]=data[i+1]=data[i+2]=val;
  }

  ctx.putImageData(imgData,0,0);
}

// OCR結果適用
function applyOCR(text1,text2){

  c1.value = find(text1,["客数","人数"]);
  t1.value = find(text1,["売上","合計"]);
  tax1.value = find(text1,["税"]);
  n1.value = find(text1,["純売上","小計"]);

  c2.value = find(text2,["客数","人数"]);
  t2.value = find(text2,["売上","合計"]);
  tax2.value = find(text2,["税"]);
  n2.value = find(text2,["純売上","小計"]);

  calc();
}

// 数値抽出
function find(text,keys){
  text = text.replace(/\n/g," ");
  for(let key of keys){
    let match = text.match(new RegExp(key+"[^0-9]*([0-9,]+)"));
    if(match) return match[1].replace(/,/g,"");
  }
  return "";
}

// 合計
function calc(){
  result.innerText =
    "客数:"+(+c1.value+ +c2.value)+"\n"+
    "売上:"+(+t1.value+ +t2.value)+"円\n"+
    "税:"+(+tax1.value+ +tax2.value)+"円\n"+
    "純売上:"+(+n1.value+ +n2.value)+"円";
}

</script>
</body>
</html>
